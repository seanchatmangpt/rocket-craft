# anti-llm.toml — per-repo scanner suppressions for rocket-craft
# Format: https://wasm4pm.dev/anti-llm-spec
# Each suppression needs a rationale. Do NOT add entries to silence real cheats.

[claim]
# Domain terms that are canonical vocabulary in this repo and must NOT
# trigger CLAIM-004 victory-language detection.
# "fully admitted" is a typestate term in unify-rs Machine<Law, Admitted>.
# "candidate" is a valid phase in the Machine<Law, Phase> pattern.
allowed_terms = [
    "fully admitted",      # TypeState: Pending → Admitted transition in rocket-sdk
    "BeginPlay",           # UE4 canonical event name
    "EventTick",           # UE4 canonical event name
    "InfinityBlade4",      # Project name — not a claim of capability
    "ShooterGame",         # Project name
    "SurvivalGame",        # Project name
    "RealisticRendering",  # Project name
]

domain_terms = [
    "fully admitted",
    "candidate",
    "done",
    "admitted",
]

[paths]
# Directories excluded from scanning
exclude = [
    "versions/",                    # Binary UE4 asset files
    "pwa-staff/*-HTML5-Shipping.*", # Pre-built Emscripten game bundles
    ".claude/",                     # Session artifacts
    "target/",                      # Rust build artifacts
    "node_modules/",                # JS deps
]

[scan]
# Directories included in the scan (relative to repo root)
include = [
    "unify-rs/unify-lsp/src",
    "unify-rs/unify-mcp/src",
    "unify-rs/unify-bp/src",
    "tools/rocket-sdk/src",
    "tools/rocket-cmd/src",
    "tools/knhk/src",
    "blueprint-rs/blueprint-core/src",
    "wasm-threads/wasm-game-logic/src",
    "wasm-threads/wasm-ui/src",
    "pwa-staff/src",
]

[surface]
# Path prefixes where SURFACE-001 (plain tower-lsp reference) fires as
# informational rather than blocking. Useful for historical docs.
non_blocking_path_prefixes = [
    "docs/",
    "CLAUDE.md",
    "versions/",
]

[test]
# Path prefixes where Vec::contains structural checks are expected.
structural_check_paths = [
    "nexus-engine/crates/nexus-tests/",
    "chicago-tdd-tools/",
    "unify-rs/unify-integration-tests/",
]