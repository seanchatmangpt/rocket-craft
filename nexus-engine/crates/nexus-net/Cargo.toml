[package]
name = "nexus-net"
version = "0.1.0"
edition = "2021"

[dependencies]
nexus-types = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["full"] }
rand = { version = "0.8", features = ["small_rng"] }
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"

[dev-dependencies]
proptest = "1"
tokio = { version = "1", features = ["full", "test-util"] }
