[package]
name = "nexus-tests"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = { version = "0.8", features = ["small_rng"] }
rand_chacha = "0.3"
thiserror = "1"
proptest = "1"

[dev-dependencies]
chicago-tdd-tools = { path = "../../../chicago-tdd-tools" }
nexus-net = { path = "../nexus-net" }
nexus-integration = { path = "../nexus-integration" }
