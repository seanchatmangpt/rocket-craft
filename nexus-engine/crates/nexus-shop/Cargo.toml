[package]
name = "nexus-shop"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
thiserror = "1"
rand = { version = "0.8", features = ["small_rng"] }
rand_chacha = "0.3"
sha2 = "0.10"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
proptest = "1"
