[package]
name = "nexus-integration"
version = "0.1.0"
edition = "2021"

[dependencies]
nexus-types = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
rand = { version = "0.8", features = ["small_rng"] }
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
proptest = "1"
