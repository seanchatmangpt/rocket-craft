[package]
name = "wasm-ui"
version = "0.2.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-core = { path = "../wasm-core" }
wasm-bindgen = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3.102", features = [
  "Window", "Document", "Element", "HtmlElement", "HtmlCanvasElement",
  "CanvasRenderingContext2d", "WebGl2RenderingContext", "WebGlProgram",
  "WebGlShader", "WebGlBuffer", "WebGlVertexArrayObject", "WebGlUniformLocation",
  "WebGlActiveInfo", "WebGlTexture", "WebGlFramebuffer", "WebGlRenderbuffer",
  "MessageEvent", "Worker", "console", "CssStyleDeclaration",
] }
js-sys = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }
chicago-tdd-tools = { path = "../../chicago-tdd-tools" }
serde_json = { workspace = true }
