; SharedEngineBase.ini - Documentation-based shared engine settings for Rocket Craft project.
; This file serves as a reference for common engine settings used across different project versions.

[/Script/Engine.RendererSettings]
; Mobile High Dynamic Range. Set to False for better performance on mobile devices.
; Most projects in Rocket Craft use False, except for ShooterGame which uses True for higher visual fidelity.
r.MobileHDR=False

; Disables vertex fog on mobile. Improves performance.
r.Mobile.DisableVertexFog=True

; Maximum number of CSM cascades for mobile.
r.Shadow.CSM.MaxMobileCascades=2

; Mobile Multi-Sample Anti-Aliasing. 1 means disabled (no MSAA).
r.MobileMSAA=1

; Use legacy shading model for mobile. Set to False to use newer shading features.
r.Mobile.UseLegacyShadingModel=False

; Discard unused quality levels to save memory.
r.DiscardUnusedQuality=False

; Allow occlusion queries. Essential for culling objects not visible to the camera.
r.AllowOcclusionQueries=True

; Minimum screen radius for lights to be rendered.
r.MinScreenRadiusForLights=0.030000

; Enable texture streaming to manage memory usage.
r.TextureStreaming=True

; Forward Shading. Set to False as default for mobile compatibility in UE 4.24.
r.ForwardShading=False

; Enable vertex fogging for opaque materials.
r.VertexFoggingForOpaque=True

; Allow static lighting (lightmaps).
r.AllowStaticLighting=True

; Generate mesh distance fields. Set to False to save performance and memory.
r.GenerateMeshDistanceFields=False

; Default Post-Processing Features
; Bloom effect. Often disabled for performance on mobile.
r.DefaultFeature.Bloom=False

; Motion Blur. Generally disabled in these projects.
r.DefaultFeature.MotionBlur=False

; Lens Flare effect.
r.DefaultFeature.LensFlare=False

; Anti-Aliasing method. 0 usually means None or FXAA depending on other settings.
r.DefaultFeature.AntiAliasing=0

[/Script/Engine.PhysicsSettings]
; Default gravity in Z axis.
DefaultGravityZ=-980.000000

; Default terminal velocity for falling objects.
DefaultTerminalVelocity=4000.000000

; Default fluid friction.
DefaultFluidFriction=0.300000

[/Script/HardwareTargeting.HardwareTargetingSettings]
; Targeted hardware class. 'Mobile' is common for Rocket Craft projects.
TargetedHardwareClass=Mobile

; Default graphics performance. 'Scalable' allows for better compatibility across devices.
DefaultGraphicsPerformance=Scalable

[/Script/Slate.SlateSettings]
; Explicit Canvas Child ZOrder. Recommended for predictable UI layering.
bExplicitCanvasChildZOrder=True

; ==============================================================================
; ROCKET CRAFT NETWORKING & PLUGINS CONFIGURATION
; Standardized configuration for Dedicated CentOS Server running on port 8889.
; For firewall, SELinux, and systemd setup, see: docs/NETWORKING.md Section 5.
; ==============================================================================

; Required Plugins (must be active in target .uproject files):
; - VaRest (JSON API client integration)
; - WebSocketNetworking (WebSocket connectivity for HTML5 clients)

[/Script/Engine.Engine]
; Configure the WebSocketNetDriver as the primary GameNetDriver.
NetDriverDefinitions=(DefName="GameNetDriver",DriverClassName="/Script/WebSocketNetworking.WebSocketNetDriver",DriverClassNameFallback="/Script/WebSocketNetworking.WebSocketNetDriver")

[/Script/HTML5Networking.WebSocketNetDriver]
; Core server configurations for WebSocket communication.
AllowPeerConnections=False
AllowPeerVoice=False
ConnectionTimeout=6000.0
InitialConnectTimeout=6000.0
AckTimeout=10.0
KeepAliveTime=20.2
MaxClientRate=15000
MaxInternetClientRate=10000
RelevantTimeout=5.0
SpawnPrioritySeconds=1.0
ServerTravelPause=4.0
NetServerMaxTickRate=30
LanServerMaxTickRate=35
; WebSocket port configuration for HTML5/web clients (Standardized to 8889).
WebSocketPort=8889
NetConnectionClassName="/Script/HTML5Networking.WebSocketConnection"
MaxPortCountToTry=512
