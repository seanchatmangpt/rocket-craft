<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Rocket Craft</title>
    <link rel="stylesheet" href="dist/style.css" />
  </head>
  <body>
    <div class="container" style="max-width: 1200px; width: 95%;">
      <h1>Profile</h1>
      <p>Welcome, <span id="user-email"></span>!</p>
      <button id="logout-button">Logout</button>
      
      <div class="dashboard" style="display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap;">
        <div class="canvas-container" style="flex: 2; min-width: 300px;">
          <canvas id="canvas" style="width: 100%; height: 500px; background: #222; border-radius: 4px; display: block; border: 1px solid #444;"></canvas>
          <div id="coords" style="margin-top: 10px; font-family: monospace; font-size: 14px; color: #555;">Initializing...</div>
        </div>
        <div class="receipt-panel" style="flex: 1; min-width: 250px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; background: #fafafa;">
          <h2 style="margin-top: 0; font-size: 1.25rem;">Cryptographic Receipt</h2>
          <div id="receipt-details" style="font-size: 14px; word-break: break-all;">Loading receipt...</div>
        </div>
      </div>
    </div>
    <script type="module" src="dist/profile.js"></script>
    <script src="/dist/hud.js"></script>
    <script src="/cache.js"></script>
  </body>
</html>
