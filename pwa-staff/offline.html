<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocket Craft - Offline</title>
    <style>
      body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: #1a1a1a;
        color: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      .container {
        text-align: center;
        padding: 40px;
        border-radius: 12px;
        background: #2d2d2d;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        max-width: 400px;
        width: 90%;
      }
      .icon {
        font-size: 64px;
        margin-bottom: 20px;
        color: #f39c12;
      }
      h1 {
        color: #f39c12;
        margin-top: 0;
        font-size: 2em;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      p {
        font-size: 1.1em;
        line-height: 1.6;
        margin-bottom: 30px;
      }
      .btn {
        display: inline-block;
        padding: 12px 24px;
        background-color: #f39c12;
        color: #1a1a1a;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        transition:
          background-color 0.3s,
          transform 0.2s;
        cursor: pointer;
        border: none;
        font-size: 1em;
      }
      .btn:hover {
        background-color: #e67e22;
        transform: translateY(-2px);
      }
      .btn:active {
        transform: translateY(0);
      }
      .status {
        margin-top: 20px;
        font-size: 0.9em;
        color: #888;
      }
      .loader {
        display: none;
        margin: 20px auto;
        border: 4px solid #3d3d3d;
        border-top: 4px solid #f39c12;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <script src="lucide.min.js"></script>
  </head>

  <body>
    <div class="container">
      <div
        class="icon"
        data-lucide="rocket"
        style="width: 64px; height: 64px; margin: 0 auto 20px"
      ></div>
      <h1>System Offline</h1>
      <p>
        It seems your connection to Rocket Craft has been interrupted. Please check your network
        settings.
      </p>

      <button class="btn" onclick="retryConnection()">
        <i
          data-lucide="refresh-cw"
          style="width: 18px; height: 18px; vertical-align: middle; margin-right: 8px"
        ></i>
        Retry Connection
      </button>
      <div id="loader" class="loader"></div>

      <div class="status">
        <i
          data-lucide="wifi-off"
          style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px"
        ></i>
        <span id="status-msg">Waiting for network...</span>
      </div>
    </div>

    <script>
      // Initialize Lucide icons
      lucide.createIcons();

      function retryConnection() {
        const loader = document.getElementById('loader');
        const btn = document.querySelector('.btn');
        const status = document.getElementById('status-msg');

        loader.style.display = 'block';
        btn.style.display = 'none';
        status.innerText = 'Attempting to reconnect...';

        // Try to fetch a small resource to check connectivity
        fetch('./favicon.ico', { mode: 'no-cors' })
          .then(() => {
            status.innerText = 'Connection restored! Reloading...';
            window.location.reload();
          })
          .catch(() => {
            setTimeout(() => {
              loader.style.display = 'none';
              btn.style.display = 'inline-block';
              status.innerText = 'Still offline. Please try again later.';
            }, 1500);
          });
      }

      // Automatically reload when coming back online
      window.addEventListener('online', () => {
        document.getElementById('status-msg').innerText = 'Back online! Reloading...';
        window.location.reload();
      });

      // Check initial state
      if (
        navigator.onLine &&
        !window.location.pathname.endsWith('/offline.html') &&
        !window.location.pathname.endsWith('offline.html')
      ) {
        // If we are online but reached this page, maybe it was a transient error
        // or the specific resource is missing.
        document.getElementById('status-msg').innerText = 'Connection detected. Refreshing...';
        // Use a slight delay to avoid infinite loops if it's a 404
        setTimeout(() => window.location.reload(), 2000);
      }
    </script>
  </body>
</html>
