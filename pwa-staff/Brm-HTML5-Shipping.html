<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barbarian Road Mashines - Rocket Craft</title>
    <style>
      body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: #111;
        color: #eee;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow-x: hidden;
      }
      .game-container {
        position: relative;
        width: 800px;
        height: 450px;
        background-color: #000;
        border: 3px solid #f39c12;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #canvas {
        width: 100%;
        height: 100%;
        display: none;
        background-color: #000;
      }
      .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(20, 20, 20, 0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        border-radius: 5px;
      }
      .title {
        font-size: 2.2em;
        color: #f39c12;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 20px;
        text-align: center;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      }
      .loader-bar-container {
        width: 80%;
        height: 20px;
        background-color: #222;
        border: 1px solid #444;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 15px;
      }
      .loader-bar {
        height: 100%;
        width: 0%;
        background-color: #f39c12;
        transition: width 0.1s linear;
      }
      .status-text {
        font-size: 1.1em;
        color: #bbb;
        margin-bottom: 5px;
      }
      .details-text {
        font-size: 0.9em;
        color: #666;
      }
      .nav-links {
        margin-top: 25px;
        display: flex;
        gap: 20px;
      }
      .nav-links a {
        color: #f39c12;
        text-decoration: none;
        font-weight: bold;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #e67e22;
      }
    </style>
  </head>
  <body>
    <div class="title">Barbarian Road Mashines</div>

    <div class="game-container">
      <div id="loading-overlay" class="loading-overlay">
        <div class="status-text" id="status">Preparing installation...</div>
        <div class="loader-bar-container">
          <div class="loader-bar" id="loader-bar"></div>
        </div>
        <div class="details-text" id="details">Connecting to asset server...</div>
      </div>
      <canvas id="canvas" width="800" height="450"></canvas>
    </div>

    <div class="nav-links">
      <a href="/index.html">Main Hub</a>
      <a href="/leaderboard.html">Leaderboard</a>
      <a href="/admin.html">Admin Panel</a>
    </div>

    <script src="Brm-HTML5-Shipping.js"></script>
  </body>
</html>
