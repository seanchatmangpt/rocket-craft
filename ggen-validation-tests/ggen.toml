[project]
name = "ue4-ontology"
version = "0.1.0"
description = "Ontology pack and validation configuration for UE4 Universal RDF Mapping"
authors = ["E2E Testing Infrastructure Implementer"]
license = "MIT"

[ontology]
source = "core.ttl"
imports = [
  "reflection.ttl",
  "blueprints.ttl",
  "subsystems.ttl",
  "typestates.ttl"
]
standard_only = false

[inference]
[[inference.rules]]
name = "infer-is-component-of"
construct = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
CONSTRUCT {
  ?component ue4:isComponentOf ?actor .
} WHERE {
  ?actor ue4:hasComponent ?component .
} ORDER BY ?actor ?component
"""
when = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
ASK {
  ?actor ue4:hasComponent ?component .
}
"""

[[inference.rules]]
name = "infer-is-level-of"
construct = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
CONSTRUCT {
  ?level ue4:isLevelOf ?world .
} WHERE {
  ?world ue4:hasLevel ?level .
} ORDER BY ?world ?level
"""
when = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
ASK {
  ?world ue4:hasLevel ?level .
}
"""

[generation]
rules = [
  { name = "readme", query = { inline = "SELECT * WHERE { ?s ?p ?o } ORDER BY ?s LIMIT 1" }, template = { inline = "# UE4 Ontology\n" }, output_file = "README.md", mode = "Overwrite" }
]

[validation]
shacl = ["shacl/validation.shacl.ttl"]
strict_mode = true

[[validation.rules]]
name = "R1"
description = "Verify class hierarchy (UObject, AActor, APawn, ACharacter, UActorComponent, USceneComponent, UWorld, ULevel existence and subClassOf connections)"
ask = """
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>

ASK {
  ue4:AActor rdfs:subClassOf ue4:UObject .
  ue4:APawn rdfs:subClassOf ue4:AActor .
  ue4:ACharacter rdfs:subClassOf ue4:APawn .
  ue4:UActorComponent rdfs:subClassOf ue4:UObject .
  ue4:USceneComponent rdfs:subClassOf ue4:UActorComponent .
  ue4:UWorld rdfs:subClassOf ue4:UObject .
  ue4:ULevel rdfs:subClassOf ue4:UObject .
}
"""

[[validation.rules]]
name = "R2"
description = "Verify subsystem domains (presence of Rendering, Physics, and Networking subsystem classes/relationships)"
ask = """
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>

ASK {
  ue4:USubsystem rdfs:subClassOf ue4:UObject .
  ue4:URenderingSubsystem rdfs:subClassOf ue4:USubsystem .
  ue4:UPhysicsSubsystem rdfs:subClassOf ue4:USubsystem .
  ue4:UNetworkingSubsystem rdfs:subClassOf ue4:USubsystem .
}
"""

[[validation.rules]]
name = "R3"
description = "Verify Reflection & Blueprint graphs (presence of reflection metadata classes like UClass, UProperty, UFunction, and Blueprint graph structures/node classes)"
ask = """
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>

ASK {
  ue4:UClass rdfs:subClassOf ue4:UStruct .
  ue4:UFunction rdfs:subClassOf ue4:UStruct .
  ue4:UProperty rdfs:subClassOf ue4:UField .
  
  ue4:UEdGraph rdfs:subClassOf ue4:UObject .
  ue4:UEdGraphNode rdfs:subClassOf ue4:UObject .
  ue4:UK2Node rdfs:subClassOf ue4:UEdGraphNode .
}
"""

[[validation.rules]]
name = "R4"
description = "Verify Cooking & WASM Typestates (presence of typestate classes/properties representing cooking, linking, WASM/HTML5 packaging states)"
ask = """
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>

ASK {
  ue4:CookingTypestate rdfs:subClassOf ue4:Typestate .
  ue4:LinkingTypestate rdfs:subClassOf ue4:Typestate .
  ue4:WasmPackagingTypestate rdfs:subClassOf ue4:Typestate .
  
  ue4:hasCookingState a rdf:Property .
  ue4:hasLinkingState a rdf:Property .
  ue4:hasPackagingState a rdf:Property .
}
"""

[[validation.rules]]
name = "RuleA"
description = "Pin Connection Direction Check: A pin cannot be connected to another pin of the same direction."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
ASK {
  FILTER NOT EXISTS {
    ?pin1 (ue4:connectedTo|^ue4:connectedTo|ue4:linkedTo|^ue4:linkedTo) ?pin2 .
    ?pin1 ue4:pinDirection ?dir .
    ?pin2 ue4:pinDirection ?dir .
  }
}
"""

[[validation.rules]]
name = "RuleB"
description = "Graph Isolation Check: Connected pins must belong to nodes within the same UEdGraph."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
ASK {
  FILTER NOT EXISTS {
    ?pin1 (ue4:connectedTo|^ue4:connectedTo|ue4:linkedTo|^ue4:linkedTo) ?pin2 .
    ?pin1 ue4:pinOf/ue4:nodeOf ?graph1 .
    ?pin2 ue4:pinOf/ue4:nodeOf ?graph2 .
    FILTER (?graph1 != ?graph2)
  }
}
"""

[[validation.rules]]
name = "RuleC"
description = "Function Call Parameter Mapping Target Integrity: Pin maps to a parameter that does not belong to the node's target called function."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
ASK {
  FILTER NOT EXISTS {
    ?pin ue4:pinOf ?node .
    ?node (ue4:callsFunction|ue4:calledFunction) ?func .
    ?pin ue4:mapsToParameter ?param .
    FILTER NOT EXISTS {
      { ?func ue4:hasParameter ?param }
      UNION
      { ?param ue4:parameterOf ?func }
    }
  }
}
"""

[[validation.rules]]
name = "RuleD"
description = "Pin Parameter Direction Match: Input pins must map to Input/InOut parameters; Output pins must map to Output/InOut/Return parameters."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
ASK {
  FILTER NOT EXISTS {
    ?pin ue4:mapsToParameter ?param .
    ?pin ue4:pinDirection ?pinDir .
    ?param ue4:parameterDirection ?paramDir .
    FILTER (
      ( ?pinDir = ue4:Input && ?paramDir != ue4:Input && ?paramDir != ue4:InOut ) ||
      ( ?pinDir = ue4:Output && ?paramDir != ue4:Output && ?paramDir != ue4:InOut && ?paramDir != ue4:Return )
    )
  }
}
"""

[[validation.rules]]
name = "RuleE"
description = "Exec vs. Data Pin Separation: An execution pin ('exec') can only connect to another execution pin."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
ASK {
  FILTER NOT EXISTS {
    ?pin1 (ue4:connectedTo|^ue4:connectedTo|ue4:linkedTo|^ue4:linkedTo) ?pin2 .
    ?pin1 ue4:pinCategory "exec" .
    ?pin2 ue4:pinCategory ?cat .
    FILTER (?cat != "exec")
  }
}
"""

[[validation.rules]]
name = "RuleF"
description = "Character Cooking State Constraint: A character must have exactly one cooking state of type CookingTypestate."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  FILTER NOT EXISTS {
    ?char a ?charClass .
    ?charClass rdfs:subClassOf* ue4:ACharacter .
    {
      FILTER NOT EXISTS {
        ?char ue4:hasCookingState ?state .
        ?state a/rdfs:subClassOf* ue4:CookingTypestate .
      }
    }
    UNION
    {
      ?char ue4:hasCookingState ?state1 .
      ?state1 a ?stateType1 .
      ?stateType1 rdfs:subClassOf* ue4:CookingTypestate .
      ?char ue4:hasCookingState ?state2 .
      ?state2 a ?stateType2 .
      ?stateType2 rdfs:subClassOf* ue4:CookingTypestate .
      FILTER (?state1 != ?state2)
    }
  }
}
"""

[[validation.rules]]
name = "RuleG"
description = "World Packaging State Constraint: A world must have exactly one packaging state of type WasmPackagingTypestate."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  FILTER NOT EXISTS {
    ?world a ?worldClass .
    ?worldClass rdfs:subClassOf* ue4:UWorld .
    {
      FILTER NOT EXISTS {
        ?world ue4:hasPackagingState ?state .
        ?state a/rdfs:subClassOf* ue4:WasmPackagingTypestate .
      }
    }
    UNION
    {
      ?world ue4:hasPackagingState ?state1 .
      ?state1 a ?stateType1 .
      ?stateType1 rdfs:subClassOf* ue4:WasmPackagingTypestate .
      ?world ue4:hasPackagingState ?state2 .
      ?state2 a ?stateType2 .
      ?stateType2 rdfs:subClassOf* ue4:WasmPackagingTypestate .
      FILTER (?state1 != ?state2)
    }
  }
}
"""

[[validation.rules]]
name = "RuleH"
description = "Input Exec Pin Connected Constraint (Broken execution flow): Input execution pins on function call nodes must be connected to an output execution pin."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

ASK {
  FILTER NOT EXISTS {
    ?pin ue4:pinOf ?node .
    ?node a/rdfs:subClassOf* ue4:UK2Node .
    ?pin ue4:pinDirection ue4:Input .
    ?pin ue4:pinCategory "exec" .
    FILTER NOT EXISTS { ?pin (ue4:connectedTo|^ue4:connectedTo|ue4:linkedTo|^ue4:linkedTo) ?other }
  }
}
"""

[[validation.rules]]
name = "RuleLabel"
description = "Public Class Label Check: All classes must have at least one rdfs:label."
ask = """
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  FILTER NOT EXISTS {
    ?class a ?type .
    FILTER (?type = owl:Class || ?type = rdfs:Class)
    FILTER (isIRI(?class))
    FILTER NOT EXISTS { ?class rdfs:label ?label }
  }
}
"""

[[validation.rules]]
name = "RuleNamespace"
description = "Namespace Sanity Check: All classes and properties must use public HTTP/HTTPS URIs, not private/opaque URNs."
ask = """
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
ASK {
  FILTER NOT EXISTS {
    ?subj a ?type .
    FILTER (?type = owl:Class || ?type = rdfs:Class || ?type = rdf:Property || ?type = owl:ObjectProperty || ?type = owl:DatatypeProperty)
    FILTER (isIRI(?subj))
    FILTER (!regex(str(?subj), "^https?://"))
  }
}
"""

[[validation.rules]]
name = "RuleInputPinConnection"
description = "Input pin connection count limit: Input pins cannot be connected to more than 1 other pin."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
ASK {
  FILTER NOT EXISTS {
    ?pin ue4:pinDirection ue4:Input .
    ?pin (ue4:connectedTo|^ue4:connectedTo|ue4:linkedTo|^ue4:linkedTo) ?other1 .
    ?pin (ue4:connectedTo|^ue4:connectedTo|ue4:linkedTo|^ue4:linkedTo) ?other2 .
    FILTER (?other1 != ?other2)
  }
}
"""

[[validation.rules]]
name = "RuleNodeParentage"
description = "A node must belong to exactly one UEdGraph: All UEdGraphNode instances must have exactly one nodeOf pointing to a valid UEdGraph."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

ASK {
  FILTER NOT EXISTS {
    ?node a/rdfs:subClassOf* ue4:UEdGraphNode .
    FILTER NOT EXISTS {
      ?node ue4:nodeOf ?graph .
      ?graph a/rdfs:subClassOf* ue4:UEdGraph .
    }
  }
  FILTER NOT EXISTS {
    ?node a/rdfs:subClassOf* ue4:UEdGraphNode .
    ?node ue4:nodeOf ?graph1 .
    ?graph1 a/rdfs:subClassOf* ue4:UEdGraph .
    ?node ue4:nodeOf ?graph2 .
    ?graph2 a/rdfs:subClassOf* ue4:UEdGraph .
    FILTER (?graph1 != ?graph2)
  }
}
"""

[[validation.rules]]
name = "RuleJ"
description = "Material Instance Parent Chain Acyclicity: A material instance parent chain cannot reference itself."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
ASK {
  FILTER NOT EXISTS {
    ?mi ue4:parentMaterial+ ?mi .
  }
}
"""

[[validation.rules]]
name = "RuleK"
description = "Material Instance Parent Chain Rootedness: A material instance parent chain must eventually resolve to a base UMaterial."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  FILTER NOT EXISTS {
    ?mi a ?miClass .
    ?miClass rdfs:subClassOf* ue4:UMaterialInstance .
    FILTER NOT EXISTS {
      ?mi ue4:parentMaterial+ ?root .
      ?root a ?rootClass .
      ?rootClass rdfs:subClassOf* ue4:UMaterial .
    }
  }
}
"""

[[validation.rules]]
name = "RuleL"
description = "RHI fallback loop: The primary rendering API and fallback rendering API cannot be the same."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
ASK {
  FILTER NOT EXISTS {
    ?subsystem ue4:primaryRHI ?rhi .
    ?subsystem ue4:fallbackRHI ?rhi .
  }
}
"""

[[validation.rules]]
name = "RuleM"
description = "WASM WebGL compliance defect: A rendering subsystem operating under a WASM / HTML5 target world must support WebGL 2.0 (OpenGL ES3) or WebGL 1.0."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  FILTER NOT EXISTS {
    ?world ue4:hasSubsystem ?subsystem .
    ?subsystem a/rdfs:subClassOf* ue4:URenderingSubsystem .
    ?world ue4:hasPackagingState ?state .
    ?state a ?stateType .
    ?stateType rdfs:subClassOf* ue4:WasmPackagingTypestate .
    FILTER NOT EXISTS {
      ?subsystem ue4:supportsRHI ue4:RHI_WebGL2 .
    }
    FILTER NOT EXISTS {
      ?subsystem ue4:supportsRHI ue4:RHI_OpenGL_ES3 .
    }
    FILTER NOT EXISTS {
      ?subsystem ue4:supportsRHI ue4:RHI_WebGL .
    }
  }
}
"""

[[validation.rules]]
name = "RuleNetRPCClass"
description = "RPC Location Constraint: RPC functions must belong to classes that are subclasses of AActor or UActorComponent."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  FILTER NOT EXISTS {
    ?rpc a/rdfs:subClassOf* ue4:URPC .
    ?class ue4:hasFunction ?rpc .
    FILTER NOT EXISTS {
      { ?class rdfs:subClassOf* ue4:AActor }
      UNION
      { ?class rdfs:subClassOf* ue4:UActorComponent }
    }
  }
}
"""

[[validation.rules]]
name = "RuleNetRPCInstanceReplication"
description = "RPC Instance Replication Constraint: Instances of classes defining RPCs must have bReplicates set to true."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  FILTER NOT EXISTS {
    ?instance a ?class .
    { ?class rdfs:subClassOf* ue4:AActor }
    UNION
    { ?class rdfs:subClassOf* ue4:UActorComponent }
    ?class rdfs:subClassOf* ?parentClass .
    ?parentClass ue4:hasFunction ?rpc .
    ?rpc a/rdfs:subClassOf* ue4:URPC .
    FILTER NOT EXISTS {
      ?instance ue4:bReplicates true .
    }
  }
}
"""

[[validation.rules]]
name = "RuleNetRPCValidationSignature"
description = "RPC Validation Signature Constraint: WithValidation RPCs must have validation functions that return boolean and match the RPC's parameters."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  # 1. Check return type is boolean
  FILTER NOT EXISTS {
    ?rpc a/rdfs:subClassOf* ue4:URPC ;
         ue4:bWithValidation true ;
         ue4:validationFunction ?valFunc .
    ?valFunc ue4:returnProperty ?retProp .
    FILTER NOT EXISTS {
      ?retProp a/rdfs:subClassOf* ue4:UBoolProperty .
    }
  }
  # 2. Check parameter count mismatch
  FILTER NOT EXISTS {
    ?rpc a/rdfs:subClassOf* ue4:URPC ;
         ue4:bWithValidation true ;
         ue4:validationFunction ?valFunc .
    {
      SELECT ?rpc (COUNT(?p1) AS ?c1)
      WHERE { ?rpc ue4:hasParameter ?p1 . }
      GROUP BY ?rpc
    }
    {
      SELECT ?valFunc (COUNT(?p2) AS ?c2)
      WHERE { ?valFunc ue4:hasParameter ?p2 . }
      GROUP BY ?valFunc
    }
    FILTER (?c1 != ?c2)
  }
  # 3. Check parameter type mismatch
  FILTER NOT EXISTS {
    ?rpc a/rdfs:subClassOf* ue4:URPC ;
         ue4:bWithValidation true ;
         ue4:validationFunction ?valFunc .
    ?rpc ue4:hasParameter ?rpcParam .
    ?rpcParam ue4:parameterIndex ?idx ;
              ue4:propertyType ?rpcType .
    FILTER NOT EXISTS {
      ?valFunc ue4:hasParameter ?valParam .
      ?valParam ue4:parameterIndex ?idx ;
                ue4:propertyType ?rpcType .
    }
  }
}
"""

[[validation.rules]]
name = "RuleNetComponentReplicationOwner"
description = "Component Replication Owner Constraint: A component cannot replicate if its owner actor is not replicated."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  FILTER NOT EXISTS {
    ?component a/rdfs:subClassOf* ue4:UActorComponent ;
               ue4:bReplicates true ;
               ue4:isComponentOf ?actor .
    FILTER NOT EXISTS {
      ?actor ue4:bReplicates true .
    }
  }
}
"""

[[validation.rules]]
name = "RuleNetWorldSubsystemTopology"
description = "World Networking Subsystem Constraint: A world with replicated actors must have a UNetworkingSubsystem."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  FILTER NOT EXISTS {
    ?world a/rdfs:subClassOf* ue4:UWorld ;
           ue4:hasLevel ?level .
    ?level ue4:hasActor ?actor .
    ?actor ue4:bReplicates true .
    FILTER NOT EXISTS {
      ?world ue4:hasSubsystem ?subsystem .
      ?subsystem a/rdfs:subClassOf* ue4:UNetworkingSubsystem .
    }
  }
}
"""

[[validation.rules]]
name = "RuleNetRepNotifyValidation"
description = "RepNotify Function Constraint: RepNotify callback functions must belong to the property's class hierarchy and return void."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  # 1. Direct property repNotify check - hierarchy
  FILTER NOT EXISTS {
    ?prop ue4:repNotifyFunction ?repFunc .
    ?propClass ue4:hasProperty ?prop .
    FILTER NOT EXISTS {
      ?propClass rdfs:subClassOf* ?parentClass .
      ?parentClass ue4:hasFunction ?repFunc .
    }
  }
  # 2. Lifetime repNotify check - hierarchy
  FILTER NOT EXISTS {
    ?lifetime a/rdfs:subClassOf* ue4:FReplicationLifetime ;
              ue4:replicatedProperty ?prop ;
              ue4:repNotifyFunction ?repFunc .
    ?propClass ue4:hasProperty ?prop .
    FILTER NOT EXISTS {
      ?propClass rdfs:subClassOf* ?parentClass .
      ?parentClass ue4:hasFunction ?repFunc .
    }
  }
  # 3. Direct/Lifetime repNotify return property check (must be void)
  FILTER NOT EXISTS {
    { ?prop ue4:repNotifyFunction ?repFunc }
    UNION
    { ?lifetime a/rdfs:subClassOf* ue4:FReplicationLifetime ; ue4:repNotifyFunction ?repFunc }
    ?repFunc ue4:returnProperty ?retProp .
  }
}
"""

[[validation.rules]]
name = "RuleParameterIndex"
description = "A parameter must have a single non-negative integer parameterIndex."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
ASK {
  FILTER NOT EXISTS {
    ?param ue4:parameterIndex ?idx .
    FILTER (?idx < 0)
  }
}
"""

[[validation.rules]]
name = "RuleAssetHTML5CookingReady"
description = "Active asset does not have a successfully cooked representation for target Platform_HTML5."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    { ?asset a ue4:UTexture }
    UNION
    { ?asset a ?t1 . ?t1 rdfs:subClassOf+ ue4:UTexture }
    UNION
    { ?asset a ue4:UStaticMesh }
    UNION
    { ?asset a ?t2 . ?t2 rdfs:subClassOf+ ue4:UStaticMesh }
    UNION
    { ?asset a ue4:USoundWave }
    UNION
    { ?asset a ?t3 . ?t3 rdfs:subClassOf+ ue4:USoundWave }

    FILTER NOT EXISTS {
      ?rep ue4:hasAsset ?asset ;
           ue4:targetPlatform ue4:Platform_HTML5 ;
           ue4:hasCookingState ue4:CookState_Cooked .
    }
  }
}
"""

[[validation.rules]]
name = "RuleHTML5TextureFormat"
description = "WebGL texture format constraint violation: HTML5 cooked textures must use ASTC or DXT formats."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?rep ue4:targetPlatform ue4:Platform_HTML5 ;
         ue4:hasAsset ?asset ;
         ue4:hasCompressionProfile ?profile .
    { ?asset a ue4:UTexture } UNION { ?asset a ?type . ?type rdfs:subClassOf+ ue4:UTexture }
    ?profile ue4:textureFormat ?format .

    FILTER (?format != ue4:TexFormat_ASTC_4x4 && 
            ?format != ue4:TexFormat_ASTC_8x8 && 
            ?format != ue4:TexFormat_DXT1 && 
            ?format != ue4:TexFormat_DXT5)
  }
}
"""

[[validation.rules]]
name = "RuleHTML5AudioFormat"
description = "Audio format constraint violation: HTML5 cooked audio must use OggVorbis format, or PCM if size is below 500KB."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?rep ue4:targetPlatform ue4:Platform_HTML5 ;
         ue4:hasAsset ?asset ;
         ue4:hasCompressionProfile ?profile ;
         ue4:bulkDataSize ?size .
    { ?asset a ue4:USoundWave } UNION { ?asset a ?type . ?type rdfs:subClassOf+ ue4:USoundWave }
    ?profile ue4:audioFormat ?format .

    FILTER (?format != ue4:AudioFormat_OggVorbis && 
            (?format = ue4:AudioFormat_PCM && ?size > 512000))
  }
}
"""

[[validation.rules]]
name = "RuleHTML5MeshLODConstraint"
description = "Mesh polygon budget violation: High-poly HTML5 cooked meshes must have at least 2 LOD channels."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?rep ue4:targetPlatform ue4:Platform_HTML5 ;
         ue4:hasAsset ?asset ;
         ue4:lodCount ?lodCount ;
         ue4:triangleCount ?triCount .
    { ?asset a ue4:UStaticMesh } UNION { ?asset a ?type . ?type rdfs:subClassOf+ ue4:UStaticMesh }

    FILTER (?lodCount < 2 && ?triCount > 20000)
  }
}
"""

[[validation.rules]]
name = "RuleHTML5AssetSizeBudget"
description = "Total cooked asset footprint exceeds maximum 50MB budget for HTML5 deployment."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?rep ue4:targetPlatform ue4:Platform_HTML5 ;
         ue4:headerSize ?hSize ;
         ue4:exportsSize ?eSize ;
         ue4:bulkDataSize ?bSize .
    BIND (?hSize + ?eSize + ?bSize AS ?totalSize)
    FILTER (?totalSize > 52428800)
  }
}
"""

[[validation.rules]]
name = "RuleWasmMemoryLayoutPageAlignment"
description = "WASM Initial/Maximum Memory page alignment violation: Memory must be a multiple of 65536 bytes."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?layout a ue4:WasmMemoryLayout .
    {
      ?layout ue4:wasmInitialMemory ?initialMemory .
      FILTER (?initialMemory <= 0 || (?initialMemory - (65536 * FLOOR(?initialMemory / 65536))) != 0)
    }
    UNION
    {
      ?layout ue4:wasmMaximumMemory ?maxMemory .
      FILTER (?maxMemory <= 0 || (?maxMemory - (65536 * FLOOR(?maxMemory / 65536))) != 0)
    }
  }
}
"""

[[validation.rules]]
name = "RuleWasmMemoryBoundaries"
description = "WASM Memory boundary mismatch: Stack size must be smaller than Initial Memory, which must be <= Maximum Memory."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?layout a ue4:WasmMemoryLayout .
    {
      ?layout ue4:wasmStackSize ?stack .
      ?layout ue4:wasmInitialMemory ?initialMemory .
      FILTER (?stack >= ?initialMemory)
    }
    UNION
    {
      ?layout ue4:wasmInitialMemory ?initialMemory .
      ?layout ue4:wasmMaximumMemory ?maxMemory .
      FILTER (?initialMemory > ?maxMemory)
    }
    UNION
    {
      ?layout ue4:wasmAllowMemoryGrowth false .
      ?layout ue4:wasmInitialMemory ?initialMemory .
      ?layout ue4:wasmMaximumMemory ?maxMemory .
      FILTER (?initialMemory != ?maxMemory)
    }
    UNION
    {
      ?layout ue4:wasmMaximumMemory ?maxMemory .
      FILTER (?maxMemory > 2147483648)
    }
  }
}
"""

[[validation.rules]]
name = "RuleWasmExportedSymbols"
description = "WASM exported symbol list incomplete: The memory layout must export the '_main' symbol."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?layout a ue4:WasmMemoryLayout .
    FILTER NOT EXISTS {
      ?layout ue4:wasmExportedSymbol "_main" .
    }
  }
}
"""

[[validation.rules]]
name = "RuleStaticBakingPaths"
description = "Projection Law violation: Statically baked configurations must declare output paths for headers, DataTables, BOM, walkthroughs, matrices, and receipts."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?config a ue4:StaticBakingConfiguration ;
            ue4:isStaticallyBaked true .
    FILTER (
      NOT EXISTS { ?config ue4:headerOutputPath ?h } ||
      NOT EXISTS { ?config ue4:dataTableOutputPath ?d } ||
      NOT EXISTS { ?config ue4:bomOutputPath ?b } ||
      NOT EXISTS { ?config ue4:walkthroughOutputPath ?w } ||
      NOT EXISTS { ?config ue4:byteClassMatrixOutputPath ?m } ||
      NOT EXISTS { ?config ue4:receiptOutputPath ?r }
    )
  }
}
"""

[[validation.rules]]
name = "RuleStaticBakingNoVaRest"
description = "Projection Law violation: Statically baked target worlds must not use dynamic VaRest calls."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?target a ue4:PackagingTarget ;
            ue4:hasStaticBaking ?bakeConfig ;
            ue4:targetWorld ?world .
    ?bakeConfig ue4:isStaticallyBaked true .
    
    ?node ue4:callsFunction ?func .
    FILTER (
        CONTAINS(STR(?func), "VaRest") || 
        CONTAINS(LCASE(STR(?func)), "varest")
    )
  }
}
"""

[[validation.rules]]
name = "RuleLinkingConfigurationShipping"
description = "Shipping build optimization violation: A 'Shipping' build mode must not use -O0 flag configuration."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?config a ue4:LinkingConfiguration ;
            ue4:buildMode "Shipping" ;
            ue4:hasOptimizationLevel ?opt .
    ?opt ue4:optFlag "-O0" .
  }
}
"""

[[validation.rules]]
name = "RuleBuildConfigurationConsistency"
description = "Shipping configuration violation: Shipping builds must optimize code, disable logging, and disable debugging symbols."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?config a ue4:BuildConfiguration ;
            rdfs:label "Shipping" .
    { ?config ue4:bOptimize false }
    UNION
    { ?config ue4:bEnableSymbols true }
    UNION
    { ?config ue4:bDisableLogging false }
  }
}
"""

[[validation.rules]]
name = "RulePreventRawAssetGeneration"
description = "Projection Law violation: RDF ontology cannot define raw pixel, mesh binary, or geometry data."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?subj ?property ?value .
    FILTER (?property IN (
        ue4:binaryMeshData,
        ue4:rawGltfString,
        ue4:texturePixelBytes,
        ue4:objFileContent,
        ue4:fbxFileContent
    ))
  }
}
"""

[[validation.rules]]
name = "RuleMaterialInstanceParameterValueType"
description = "Material parameter type mismatch: Overridden parameter value type does not match the parameter definition type in the base material."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?mi ue4:hasParameterValue ?paramVal .
    ?paramVal ue4:parameterName ?paramName .
    ?mi ue4:parentMaterial* ?ancestor .
    ?ancestor a/rdfs:subClassOf* ue4:UMaterial .
    ?ancestor ue4:definesParameter ?paramDef .
    
    { ?paramDef rdfs:label ?paramName }
    UNION
    { ?paramDef ue4:parameterName ?paramName }
    
    ?paramDef a ?paramType .
    
    FILTER (
      ( EXISTS { ?paramDef a/rdfs:subClassOf* ue4:UScalarParameter } && 
        ( NOT EXISTS { ?paramVal ue4:scalarValue ?v } || EXISTS { ?paramVal ue4:vectorValue ?v2 } || EXISTS { ?paramVal ue4:textureValue ?v3 } ) ) ||
      ( EXISTS { ?paramDef a/rdfs:subClassOf* ue4:UVectorParameter } && 
        ( NOT EXISTS { ?paramVal ue4:vectorValue ?v } || EXISTS { ?paramVal ue4:scalarValue ?v2 } || EXISTS { ?paramVal ue4:textureValue ?v3 } ) ) ||
      ( EXISTS { ?paramDef a/rdfs:subClassOf* ue4:UTextureParameter } && 
        ( NOT EXISTS { ?paramVal ue4:textureValue ?v } || EXISTS { ?paramVal ue4:scalarValue ?v2 } || EXISTS { ?paramVal ue4:vectorValue ?v3 } ) )
    )
  }
}
"""

[[validation.rules]]
name = "RuleMaterialParameterValueExclusion"
description = "Invalid parameter value definition: A UMaterialParameterValue must contain exactly one type of value (scalarValue, vectorValue, or textureValue)."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?paramVal a ue4:UMaterialParameterValue .
    BIND(IF(EXISTS { ?paramVal ue4:scalarValue ?s }, 1, 0) +
         IF(EXISTS { ?paramVal ue4:vectorValue ?v }, 1, 0) +
         IF(EXISTS { ?paramVal ue4:textureValue ?t }, 1, 0) AS ?valCount)
    FILTER (?valCount != 1)
  }
}
"""

[[validation.rules]]
name = "RuleShaderClassWellFormedness"
description = "A UShaderClass must have at least one shaderFrequency stage."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?shader a ue4:UShaderClass .
    FILTER NOT EXISTS { ?shader ue4:shaderFrequency ?freq }
  }
}
"""

[[validation.rules]]
name = "RuleShaderParameterWellFormedness"
description = "A UShaderParameter must have exactly one name string and exactly one type declaration string."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?param a ue4:UShaderParameter .
    {
      SELECT ?param (COUNT(?name) AS ?ncount) (COUNT(?type) AS ?tcount)
      WHERE {
        OPTIONAL { ?param ue4:shaderParameterName ?name }
        OPTIONAL { ?param ue4:shaderParameterType ?type }
      }
      GROUP BY ?param
    }
    FILTER (?ncount != 1 || ?tcount != 1)
  }
}
"""

[[validation.rules]]
name = "RuleMaterialCompiledShaders"
description = "Material shader compilation incomplete: A UMaterial must compile to at least one Vertex Shader (SF_Vertex) and one Pixel Shader (SF_Pixel)."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?mat a ?matType .
    ?matType rdfs:subClassOf* ue4:UMaterial .
    {
      FILTER NOT EXISTS {
        ?mat ue4:compilesToShader ?shader .
        ?shader ue4:shaderFrequency ue4:SF_Vertex .
      }
    }
    UNION
    {
      FILTER NOT EXISTS {
        ?mat ue4:compilesToShader ?shader .
        ?shader ue4:shaderFrequency ue4:SF_Pixel .
      }
    }
  }
}
"""

[[validation.rules]]
name = "RuleERenderAPIFallbackAcyclicity"
description = "Render API fallback loop detected: A rendering API cannot fallback to itself through transitively chained transitions."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?rhi ue4:fallbackTo+ ?rhi .
  }
}
"""

[[validation.rules]]
name = "RuleRenderingSubsystemFallbackReachability"
description = "Rendering Subsystem fallback path error: The configured fallbackRHI is not reachable from the primaryRHI via the fallbackTo chain."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?subsystem ue4:primaryRHI ?primary ;
               ue4:fallbackRHI ?fallback .
    FILTER NOT EXISTS { ?primary ue4:fallbackTo+ ?fallback }
  }
}
"""

[[validation.rules]]
name = "RulePackagingTargetRhiSupport"
description = "RHI profile mismatch: The target RHI Profile API configured in the PackagingTarget must be supported by the target world's RenderingSubsystem."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?target ue4:targetWorld ?world ;
            ue4:targetRHIProfile ?profile .
    ?profile ue4:hasRenderAPI ?renderAPI .
    ?world ue4:hasSubsystem ?subsystem .
    ?subsystem a/rdfs:subClassOf* ue4:URenderingSubsystem .
    FILTER NOT EXISTS { ?subsystem ue4:supportsRHI ?renderAPI }
  }
}
"""

[[validation.rules]]
name = "RuleCollisionProfileProperties"
description = "A collision profile must have exactly one profileName, exactly one collisionEnabled, and exactly one collisionObjectType."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?profile a ue4:UCollisionProfile .
    {
      SELECT ?profile (COUNT(?name) AS ?ncount) (COUNT(?enabled) AS ?ecount) (COUNT(?type) AS ?tcount)
      WHERE {
        OPTIONAL { ?profile ue4:profileName ?name }
        OPTIONAL { ?profile ue4:collisionEnabled ?enabled }
        OPTIONAL { ?profile ue4:collisionObjectType ?type }
      }
      GROUP BY ?profile
    }
    FILTER (?ncount != 1 || ?ecount != 1 || ?tcount != 1)
  }
}
"""

[[validation.rules]]
name = "RuleCollisionProfileUniqueChannels"
description = "Collision profile channel conflict: A collision profile cannot define multiple responses for the same collision channel."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?profile ue4:hasChannelResponse ?resp1 ;
             ue4:hasChannelResponse ?resp2 .
    ?resp1 ue4:hasResponseChannel ?channel .
    ?resp2 ue4:hasResponseChannel ?channel .
    FILTER (?resp1 != ?resp2)
  }
}
"""

[[validation.rules]]
name = "RulePhysicsSubsystemUniqueProfileNames"
description = "Duplicate collision profile names registered: Each registered collision profile must have a unique profileName."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?subsystem ue4:registersCollisionProfile ?profile1 ;
               ue4:registersCollisionProfile ?profile2 .
    ?profile1 ue4:profileName ?name .
    ?profile2 ue4:profileName ?name .
    FILTER (?profile1 != ?profile2)
  }
}
"""

[[validation.rules]]
name = "RuleComponentCollisionProfileRegistration"
description = "Unregistered collision profile: The collision profile used by this component is not registered in the world's physics subsystem."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?world ue4:hasLevel/ue4:hasActor/ue4:hasComponent ?component .
    ?component ue4:hasCollisionProfile ?profile .
    ?world ue4:hasSubsystem ?physSub .
    ?physSub a/rdfs:subClassOf* ue4:UPhysicsSubsystem .
    FILTER NOT EXISTS {
      ?physSub ue4:registersCollisionProfile ?profile .
    }
  }
}
"""

[[validation.rules]]
name = "RuleRigidBodyPhysicalLimits"
description = "Rigid body physical parameters (linearDamping, angularDamping, maxLinearVelocity, maxAngularVelocity) must be non-negative."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?body a ue4:URigidBody .
    {
      ?body ue4:linearDamping ?val .
      FILTER (?val < 0.0)
    }
    UNION
    {
      ?body ue4:angularDamping ?val .
      FILTER (?val < 0.0)
    }
    UNION
    {
      ?body ue4:maxLinearVelocity ?val .
      FILTER (?val < 0.0)
    }
    UNION
    {
      ?body ue4:maxAngularVelocity ?val .
      FILTER (?val < 0.0)
    }
  }
}
"""

[[validation.rules]]
name = "RuleRPCReturnTypeVoid"
description = "RPC return type violation: RPC functions must return void (no returnProperty)."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?rpc a/rdfs:subClassOf* ue4:URPC .
    ?rpc ue4:returnProperty ?retProp .
  }
}
"""

[[validation.rules]]
name = "RuleClientRPCValidationProhibited"
description = "RPC validation function violation: Client and NetMulticast RPCs cannot specify WithValidation or a validationFunction."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?rpc a ?type .
    FILTER (?type = ue4:UClientRPC || ?type = ue4:UNetMulticastRPC)
    {
      ?rpc ue4:bWithValidation true .
    }
    UNION
    {
      ?rpc ue4:validationFunction ?func .
    }
  }
}
"""

[[validation.rules]]
name = "RuleServerRPCValidationMandatory"
description = "Server RPC validation missing: Server RPC functions must specify WithValidation and a validationFunction."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?rpc a/rdfs:subClassOf* ue4:UServerRPC .
    FILTER NOT EXISTS {
      ?rpc ue4:bWithValidation true ;
           ue4:validationFunction ?valFunc .
    }
  }
}
"""

[[validation.rules]]
name = "RuleRPCValidationClassScope"
description = "RPC validation function class scope violation: The validation function must be a member of the same class (or a base class) as the RPC."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?rpc ue4:bWithValidation true ;
         ue4:validationFunction ?valFunc .
    ?rpcClass ue4:hasFunction ?rpc .
    FILTER NOT EXISTS {
      ?rpcClass rdfs:subClassOf* ?valClass .
      ?valClass ue4:hasFunction ?valFunc .
    }
  }
}
"""

[[validation.rules]]
name = "RuleKinematicSimulationDisconnect"
description = "Kinematic parameter disconnect: if bSimulatePhysics is true, the associated rigid body's physicsType must be PhysType_Simulated or PhysType_Default."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?comp ue4:bSimulatePhysics true ;
          ue4:hasRigidBody ?body .
    FILTER NOT EXISTS {
      ?body ue4:physicsType ?physType .
      FILTER (?physType = ue4:PhysType_Simulated || ?physType = ue4:PhysType_Default)
    }
  }
}
"""

[[validation.rules]]
name = "RuleStrengthenedComponentReplicationOwner"
description = "Component replication owner violation: Replicated components must belong to a replicated actor, and cannot be orphaned."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?component a/rdfs:subClassOf* ue4:UActorComponent ;
               ue4:bReplicates true .
    {
      ?component ue4:isComponentOf ?actor .
      FILTER NOT EXISTS { ?actor ue4:bReplicates true }
    }
    UNION
    {
      FILTER NOT EXISTS { ?component ue4:isComponentOf ?anyActor }
    }
  }
}
"""

[[validation.rules]]
name = "RuleReplicationConditionConsistency"
description = "Replication condition inconsistency: Properties must not have replication conditions or lifetimes assigned if they are not explicitly declared as replicating."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    {
      ?prop a/rdfs:subClassOf* ue4:UProperty ;
            ue4:lifetimeCondition ?cond .
    }
    UNION
    {
      ?lifetime a/rdfs:subClassOf* ue4:FReplicationLifetime ;
                ue4:replicatedProperty ?prop .
    }
    FILTER NOT EXISTS { ?prop ue4:bReplicated true }
  }
}
"""

[[validation.rules]]
name = "RuleRepNotifyRequiresReplication"
description = "RepNotify requires replication: RepNotify callback functions can only be declared on properties that are replicated."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    {
      ?prop a/rdfs:subClassOf* ue4:UProperty ;
            ue4:repNotifyFunction ?func .
    }
    UNION
    {
      ?lifetime a/rdfs:subClassOf* ue4:FReplicationLifetime ;
                ue4:replicatedProperty ?prop ;
                ue4:repNotifyFunction ?func .
    }
    FILTER NOT EXISTS { ?prop ue4:bReplicated true }
  }
}
"""

[[validation.rules]]
name = "RuleCompleteReplicatedPropertySpecification"
description = "Replicated property specification incomplete: Replicated properties must specify a lifetime condition or corresponding replication lifetime registration."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?prop a/rdfs:subClassOf* ue4:UProperty ;
          ue4:bReplicated true .
    FILTER NOT EXISTS {
      { ?prop ue4:lifetimeCondition ?anyCond }
      UNION
      { ?lifetime ue4:replicatedProperty ?prop }
    }
  }
}
"""

[[validation.rules]]
name = "RuleRPCParameterObjectTypeSafety"
description = "RPC parameter type safety violation: Object parameters passed to RPCs must inherit from AActor or UActorComponent."
ask = """
PREFIX ue4: <https://rocket-craft.io/ontology/ue4/>
PREFIX owl: <http://www.w3.org/2002/07/owl#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
ASK {
  ?ontology a owl:Ontology .
  FILTER NOT EXISTS {
    ?rpc a/rdfs:subClassOf* ue4:URPC ;
         ue4:hasParameter ?param .
    ?param a/rdfs:subClassOf* ue4:UObjectProperty ;
           ue4:propertyType ?paramType .
    FILTER NOT EXISTS {
      { ?paramType rdfs:subClassOf* ue4:AActor }
      UNION
      { ?paramType rdfs:subClassOf* ue4:UActorComponent }
    }
  }
}
"""


