[package]
name = "unify"
version = "0.1.0"
edition = "2021"
description = "Unified CLI entrypoint for the unify-rs abstraction layer"

[[bin]]
name = "unify"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
unify-core = { path = "../unify-core" }
unify-receipts = { path = "../unify-receipts" }
unify-admission = { path = "../unify-admission" }
unify-rdf = { path = "../unify-rdf" }
unify-lsp = { path = "../unify-lsp" }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
