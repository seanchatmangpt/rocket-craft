[package]
name = "unify"
version = "0.1.0"
edition = "2021"
description = "Unified CLI entrypoint for the unify-rs abstraction layer"

[[bin]]
name = "unify"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
unify-core = { path = "../unify-core" }
unify-receipts = { path = "../unify-receipts" }
unify-admission = { path = "../unify-admission" }
unify-rdf = { path = "../unify-rdf" }
unify-sem = { path = "../unify-sem" }
unify-lsp = { path = "../unify-lsp" }
anti-llm-cheat-lsp = { path = "../anti-llm-cheat-lsp" }
genie-core = { path = "../genie-core" }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
