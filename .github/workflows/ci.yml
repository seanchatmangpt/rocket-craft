name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master", "main"]

jobs:
  pwa-staff:
    name: PWA — lint, type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa-staff

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pwa-staff/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  chicago-tdd-tools:
    name: Rust — chicago-tdd-tools
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chicago-tdd-tools

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chicago-tdd-tools

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test --all-features

  nexus-engine:
    name: Rust — nexus-engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-engine

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nexus-engine

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  wasm-threads:
    name: Rust — wasm-threads
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wasm-threads

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm-threads

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  unify-rs:
    name: Rust — unify-rs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unify-rs

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: unify-rs

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  blueprint-rs:
    name: Rust — blueprint-rs
    runs-on: ubuntu-latest
    defaults:
