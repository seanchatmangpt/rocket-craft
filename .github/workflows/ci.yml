name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master", "main"]

jobs:
  pwa-staff:
    name: PWA — lint, type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa-staff

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pwa-staff/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  chicago-tdd-tools:
    name: Rust — test chicago-tdd-tools
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chicago-tdd-tools

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: chicago-tdd-tools

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test --all-features
